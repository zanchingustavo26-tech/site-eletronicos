<div id="lista-carrinho"></div>

<div class="total-carrinho">
Total: R$ <span id="total">0</span>
<div class="pagamento">

<h2>Forma de pagamento</h2>

<div class="opcoes-pagamento">

<button onclick="mostrarPagamento('pix')">PIX</button>

<button onclick="mostrarPagamento('cartao')">Cartão</button>

<button onclick="mostrarPagamento('boleto')">Boleto</button>

</div>

<div id="pix" class="metodo">
<h3>Pagamento via PIX</h3>
<p>Chave PIX: pagamento@gamestore.com</p>
<p>Após o pagamento o produto será liberado.</p>
</div>

<div id="cartao" class="metodo">
<h3>Pagamento com Cartão</h3>

<input type="text" placeholder="Número do cartão">
<input type="text" placeholder="Nome no cartão">
<input type="text" placeholder="Validade">
<input type="text" placeholder="CVV">

<button class="finalizar">Finalizar pagamento</button>

</div>

<div id="boleto" class="metodo">
<h3>Pagamento via Boleto</h3>
<p>Clique abaixo para gerar seu boleto.</p>

<button onclick="gerarBoleto()">Gerar boleto</button>

</div>

</div>
</div>
<script>

let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];

function atualizarCarrinho(){

let lista = document.getElementById("lista-carrinho");
lista.innerHTML="";

let total = 0;

carrinho.forEach((produto,index)=>{

let item = document.createElement("div");

item.className="item-carrinho";

item.innerHTML = `

<img src="${produto.imagem}">

<div class="info-produto">

<h3>${produto.nome}</h3>

<p>R$ ${produto.valor}</p>

<div class="quantidade">

<button onclick="diminuir(${index})">-</button>

<span>${produto.qtd}</span>

<button onclick="aumentar(${index})">+</button>

</div>

</div>

<button class="remover" onclick="remover(${index})">🗑</button>

`;

lista.appendChild(item);

total += produto.valor * produto.qtd;


});

document.getElementById("total").innerText = total;

localStorage.setItem("carrinho",JSON.stringify(carrinho));

}

function aumentar(index){

carrinho[index].qtd++;

atualizarCarrinho();

}

function diminuir(index){

if(carrinho[index].qtd > 1){

carrinho[index].qtd--;

}else{

carrinho.splice(index,1);

}

atualizarCarrinho();

}

function remover(index){

carrinho.splice(index,1);

atualizarCarrinho();

}

atualizarCarrinho();

</script><script>

function mostrarPagamento(tipo){

document.getElementById("pix").style.display="none";
document.getElementById("cartao").style.display="none";
document.getElementById("boleto").style.display="none";

document.getElementById(tipo).style.display="block";

}

function gerarBoleto(){

alert("Boleto gerado! Use o código enviado para pagamento.");

}

</script>
